# ============================================================
# 量化评分因子权重配置
# 模块: cluster / offline
# 说明: 4 因子加权求和 → quant_score
#       所有因子已归一化到 0-100
#       quant_score = w1*momentum + w2*volume_factor
#                   + w3*relative_strength + w4*volatility
# ============================================================

# 动量因子 — 当前价格 / N期前价格 - 1（N 默认 10 个交易日）
momentum.weight = 0.35

# 量能因子 — 当前成交量 / N期平均成交量（N 默认 5 个交易日）
volume_factor.weight = 0.30

# 相对强度因子 — 个股收益率 - 市场平均收益率
relative_strength.weight = 0.20

# 波动率因子 — N期收益率标准差（N 默认 20 个交易日，取反）
volatility.weight = 0.15

# -------------------- 因子计算参数 --------------------
# 动量回溯期（交易日）
momentum.lookback = 10

# 量能均线期（交易日）
volume_factor.lookback = 5

# 波动率计算窗口（交易日）
volatility.lookback = 20

# 相对强度计算窗口（交易日）
relative_strength.lookback = 20
