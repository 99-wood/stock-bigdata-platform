# ============================================================
# 股票大数据平台 — 应用配置
# 本地开发用，集群部署时覆盖
# ============================================================

# ---- Kafka ----
kafka.bootstrap.servers=192.168.137.210:9092
kafka.topic=stock_quote_raw
# Consumer group，与 consumer-start.sh / kafka-monitor.sh / cluster-clean.sh 保持一致
kafka.group.id=stock_streaming_consumer_v2

# ---- HDFS ----
hdfs.uri=hdfs://192.168.137.201:9000
hdfs.ods.path=/stock/ods/quote_raw
hdfs.dwd.path=/stock/dwd/quote_clean
hdfs.checkpoint.path=/stock/checkpoint/streaming

# ---- MySQL (stock_ads 库) ----
mysql.url=jdbc:mysql://192.168.137.210:3306/stock_ads?useUnicode=true&characterEncoding=utf8&rewriteBatchedStatements=true&useSSL=false&cachePrepStmts=true&useServerPrepStmts=false
mysql.user=stock_admin
mysql.password=stock2026

# ---- Redis (mid:6379) ----
redis.host=192.168.137.210
redis.port=6379
redis.password=1
# Pipeline 模式: 每 500 条打包发送 EVALSHA，减少网络往返。false=逐条发送
redis.pipeline.enabled=true

# ---- Streaming ----
# Spark Streaming batch 间隔 (秒)，默认 5
streaming.batch.duration.seconds=5
# 分钟 OHLCV 窗口大小 (秒)，默认 300=5分钟
streaming.minute.window.seconds=300

# ---- Feature Toggles (均默认 true，设为 false 可禁用) ----
# HDFS ODS 层: Kafka 原始 JSON 归档 → /stock/ods/quote_raw/
feature.ods.enabled=true
# HDFS DWD 层: 清洗后 Parquet → /stock/dwd/quote_clean/（离线 Spark SQL 输入）
feature.dwd.enabled=true
# 实时榜单: 每 batch 从 Redis 读取全量 OHLCV → ZSet 排名 → MySQL ads_stock_rank
feature.rank.enabled=true
# 市场概览归档: 每 batch 从 Redis HGETALL → MySQL ads_market_summary
feature.market.enabled=true
